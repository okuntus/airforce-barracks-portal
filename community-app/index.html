<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eef3fa" />
    <title>Airforce Information Portal</title>
    <script>
      (function applyInitialTheme() {
        var preferenceKey = 'appThemePreference';
        var legacyKey = 'appTheme';
        var valid = { light: true, dark: true, system: true };
        var savedPreference = localStorage.getItem(preferenceKey) || localStorage.getItem(legacyKey) || 'system';
        var preference = valid[savedPreference] ? savedPreference : 'system';
        var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolvedTheme = preference === 'system' ? (systemDark ? 'dark' : 'light') : preference;

        var root = document.documentElement;
        root.setAttribute('data-theme-preference', preference);
        root.setAttribute('data-theme', resolvedTheme);
        root.style.colorScheme = resolvedTheme;
      })();
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      #root {
        min-height: 100vh;
      }

      html[data-theme='light'] body {
        background-color: #eef3fa;
        color: #0f172a;
      }

      html[data-theme='dark'] body {
        background-color: #0b1220;
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
